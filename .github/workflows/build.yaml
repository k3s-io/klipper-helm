name: build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - amd64

    permissions:
      contents: read

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.platform }}
          push: false

  build-arm:
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64
          - arm/v7
          - riscv64

    permissions:
      contents: read

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.platform }}
          push: false
  
  build-riscv-amd:
    if: github.repository_owner == 'k3s-io'
    runs-on: cncf-ubuntu-24-96-x86

    strategy:
      fail-fast: false
      matrix:
        platform:
          - riscv64

    permissions:
      contents: read

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.platform }}
          push: false
